services:
  frontend:
    build: ./frontend
    container_name: student-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - student-network

  backend:
    build: ./backend
    container_name: student-backend
    ports:
      - "5000:5000"
    environment:
      DB_HOST: database
      DB_USER: postgres
      DB_PASSWORD: password123
      DB_NAME: studentdb
    depends_on:
      - database
    networks:
      - student-network

  database:
    image: postgres:16-alpine
    container_name: student-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: studentdb
    volumes:
      - student-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - student-network

volumes:
  student-db-data:

networks:
  student-network:
    driver: bridge